services:
  db:
    image: postgres:15
    container_name: acra-postgres
    environment:
      POSTGRES_DB: acra_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - acra-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acra_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  acra-postgres-data:
