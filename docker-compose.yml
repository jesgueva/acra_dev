services:
  db:
    image: postgres:15
    # Overridable so a second worktree (or a host that already has 5433 taken by an
    # unrelated stack) can bring this up without editing a tracked file. Defaults are
    # the documented ones, so the plain `docker compose up -d` is unchanged.
    container_name: ${ACRA_DB_CONTAINER:-acra-postgres}
    environment:
      POSTGRES_DB: acra_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${ACRA_DB_PORT:-5433}:5432"
    volumes:
      - acra-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acra_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  acra-postgres-data:
